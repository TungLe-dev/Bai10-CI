name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4


      - name: Set up JDK 17
        uses: actions/setup-java@v4 # dùng java 4 ???
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and test
        run: mvn package